<body>
    <header>
        <div class="logo">meomeo store</div>
        <nav>
            <ul>
                <li><a href="index.html">Trang Chủ</a></li>
                <li class="dropdown">
                    <a href="categories.html">Danh Mục</a>
                    <div class="dropdown-content">
                        <a href="van-hoc.html">Văn Học</a>

            </ul>
        </nav>
    </header>

    <section style="padding: 20px;">
        <h2 style="text-align: center;">Đặt Hàng</h2>
        <p style="text-align: center;">Điền thông tin để mua sách  từ meomeo store!</p>
    <form id="order-form" action="#" method="post">
        <label for="name">Tên:</label>
        <input type="text" id="name" name="name" required>
        
        <label for="email">Email:</label>
        <input type="email" id="email" name="email" required>
        
        <label for="phone">Số Điện Thoại:</label>
        <input type="tel" id="phone" name="phone" maxlength="10" placeholder="Nhập 10 số " required>
        
        <label for="quantity">Số Lượng:</label>
        <input type="number" id="quantity" name="quantity" min="1" max="10" required>
        
        <label for="message">Sách Muốn Mua:</label>
        <textarea id="message" name="message"></textarea>
        
        <button type="submit">Đặt Hàng</button>
    </form>
    </section>

    <footer>
        <p>&copy; 2026 meomeo store. Tất cả quyền được bảo lưu.</p>
    </footer>
